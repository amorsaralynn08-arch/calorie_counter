{% extends 'base.html' %}

{% block content %}

<h2>Add Food</h2>

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">

        <label>Food Name</label>

        <input
            type="text"
            name="food_name"
            class="form-control"
            required>

    </div>

    <div class="mb-3">

        <label>Calories</label>

        <input
            type="number"
            name="calories"
            class="form-control"
            required>

    </div>

    <button class="btn btn-success">
        Save
    </button>

    <a href="{% url 'home' %}" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
